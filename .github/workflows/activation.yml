name: Get Activation File

on:
  workflow_dispatch:

jobs:
  activation:
    name: Request Activation File (.alf) 🔑
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Request activation file
        run: |
          docker run --rm \
            -v "$(pwd):/project" \
            unityci/editor:ubuntu-2022.3.20f1-base-3 \
            unity-editor \
              -batchmode \
              -nographics \
              -createManualActivationFile \
              -logfile /dev/stdout \
              -quit || true
          
          echo "Listing all files to find .alf:"
          find . -name "*.alf"
          
          # Tentar mover qualquer .alf encontrado para a raiz com nome fixo
          find . -name "*.alf" -exec mv {} ./Unity.alf \;
          
      - uses: actions/upload-artifact@v4
        with:
          name: activation-file
          path: Unity.alf
