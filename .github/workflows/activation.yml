name: Get Activation File

on:
  workflow_dispatch:

jobs:
  activation:
    name: Request Activation File (.alf) 🔑
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Request activation file
        run: |
          docker run --rm \
            -v "$(pwd):/project" \
            unityci/editor:ubuntu-2022.3.20f1-base-3 \
            unity-editor \
              -batchmode \
              -nographics \
              -createManualActivationFile \
              -logfile /dev/stdout \
              -quit
      - name: Rename and Upload
        run: |
          mv *.alf Unity_v6000.0.23f1.alf || true
      - uses: actions/upload-artifact@v4
        with:
          name: activation-file
          path: ./*.alf
